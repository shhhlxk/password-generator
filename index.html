<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🔐 Password Generator</h1>

    <div class="password-box">
        <input type="password" id="password" readonly>
        <button id="toggle">👁</button>
    </div>

    <button class="copy-btn" onclick="copyPassword()">Copy Password</button>
    <p id="copied"></p>

    <label>Password Length:
        <span id="lengthValue">12</span>
    </label>

    <input
        type="range"
        id="length"
        min="4"
        max="32"
        value="12"
    >

    <label><input type="checkbox" id="uppercase" checked> Uppercase</label>
    <label><input type="checkbox" id="lowercase" checked> Lowercase</label>
    <label><input type="checkbox" id="numbers" checked> Numbers</label>
    <label><input type="checkbox" id="symbols" checked> Symbols</label>

    <button class="generate-btn" onclick="generatePassword()">
        Generate Password
    </button>

    <div class="strength">
        Strength:
        <span id="strengthText">Medium</span>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
